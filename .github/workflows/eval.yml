# ─────────────────────────────────────────────────────────────────────────────
# NeuralVault — RAGAS Evaluation CI
#
# Runs automatically on every push to main and every pull request.
# If any RAGAS metric drops below 0.7, the build FAILS and the PR is blocked.
# This ensures retrieval quality can never silently regress.
#
# Pipeline:
#   1. Install dependencies
#   2. Seed the knowledge base (chroma_db/ is gitignored, so CI starts empty)
#   3. Run RAGAS evaluation against 38 tiered golden-dataset Q&A pairs
#   4. Upload eval_results.json as artifact for score tracking
#
# Required secret:
#   GROQ_API_KEY — set in GitHub repo Settings → Secrets → Actions
# ─────────────────────────────────────────────────────────────────────────────

name: NeuralVault Eval

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ragas-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/sentence_transformers
          key: ${{ runner.os }}-st-all-MiniLM-L6-v2

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed knowledge base
        run: |
          python eval/seed_knowledge.py

      - name: Run RAGAS evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python eval/eval.py --threshold 0.7

      - name: Upload eval results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: eval/eval_results.json
