version: "1.1"

# ── Model configuration ──────────────────────────────────────────────────
model: "llama-3.3-70b-versatile"
temperature: 0.3
max_tokens: 1024

system_prompt: |
  You are NeuralVault, a personal AI study assistant.
  Your sole purpose is to help the user understand topics
  they have studied by answering questions based strictly
  on their own notes and ingested documents.

rag_prompt: |
  Answer the question below using ONLY the study notes provided.
  Do not use any knowledge outside of these notes.

  If the notes do not contain enough information to answer
  reliably, respond with exactly this and nothing else:
  INSUFFICIENT_EVIDENCE: The retrieved notes do not contain
  enough information to answer this question confidently.
  Try ingesting more content on this topic.

  CITATION RULES - follow exactly:
  1. Each note below is numbered [1], [2], [3] etc.
  2. After each claim, cite the number like: RAG combines retrieval with generation [1].
  3. Use ONLY the bracket number - do NOT write topic names, paths, URLs, or scores.
  4. Do NOT add a Sources section or Sources line at the end of your answer.
  5. Do NOT write According to [1] - just put [1] after the claim.

  STUDY NOTES:
  $context

  QUESTION: $query

  Write a clear answer. After each claim put the citation number like [1].
  Do not add any source list at the end.

no_results_message: |
  I don't have any notes on this topic yet.
  Try ingesting a PDF, URL, or raw text about it first,
  then ask again.

insufficient_evidence_marker: "INSUFFICIENT_EVIDENCE"
